# Alacritty Configuration File
# Font settings
[font]
# Font family for normal text
normal.family = "FiraCode Nerd Font"
normal.style = "Regular"

# Font family for bold text
bold.family = "FiraCode Nerd Font"
bold.style = "Bold"

# Font family for italic text
italic.family = "FiraCode Nerd Font"
italic.style = "Italic"

# Font family for bold italic text
bold_italic.family = "FiraCode Nerd Font"
bold_italic.style = "Bold Italic"

# Font size in points
size = 14.0

# Font offset
offset.x = 0
offset.y = 0


# Window settings
[window]
# Initial dimensions (columns x lines)
dimensions.columns = 80
dimensions.lines = 24

# Padding around the terminal content
padding.x = 5
padding.y = 5

# Decorations: "full", "none", "transparent"
decorations = "full"

# Enable/disable dynamic padding
dynamic_padding = false

# Colors (Catppuccin Macchiato)
[colors]
[colors.primary]
background = "#24273a"
foreground = "#cad3f5"

[colors.normal]
black   = "#494d64"
red     = "#ed8796"
green   = "#a6da95"
yellow  = "#eed49f"
blue    = "#8aadf4"
magenta = "#c6a0f6"
cyan    = "#8bd5ca"
white   = "#b8c0e0"

[colors.bright]
black   = "#5b6078"
red     = "#ed8796"
green   = "#a6da95"
yellow  = "#eed49f"
blue    = "#8aadf4"
magenta = "#c6a0f6"
cyan    = "#8bd5ca"
white   = "#a5adcb"

# Cursor settings
[cursor]
style = "Block"

# Scrolling
[scrolling]
history = 10000
multiplier = 3

[keyboard]

# Shell settings
[terminal.shell]
program = "/bin/zsh"

# Key bindings
# Paste with Ctrl+Shift+V
[[keyboard.bindings]]
key = "V"
mods = ["Control", "Shift"]
action = "Paste"

# Copy with Ctrl+Shift+C
[[keyboard.bindings]]
key = "C"
mods = ["Control", "Shift"]
action = "Copy"

[terminal]

